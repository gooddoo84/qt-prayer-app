<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>QT 7분법 기도</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#0a0a0a;color:#e4e4e7;min-height:100dvh;-webkit-user-select:none;user-select:none}
textarea{-webkit-user-select:text;user-select:text}
.container{max-width:440px;margin:0 auto;padding:20px;min-height:100dvh;display:flex;flex-direction:column}
.page{display:none;flex:1;flex-direction:column}
.page.active{display:flex}

/* Home */
.home-icon{font-size:48px;text-align:center;margin:40px 0 16px}
h1{font-size:22px;text-align:center;font-weight:700}
.subtitle{text-align:center;color:#71717a;font-size:13px;margin-top:4px}
.card{background:#18181b;border:1px solid #27272a;border-radius:16px;padding:20px;margin:24px 0}
.card-label{font-size:11px;color:#71717a;text-transform:uppercase;letter-spacing:1px}
.card-title{font-size:22px;font-weight:700;margin:6px 0 4px}
.card-sub{font-size:13px;color:#71717a}
.progress-bar{width:100%;height:5px;background:#27272a;border-radius:4px;margin-top:12px;overflow:hidden}
.progress-fill{height:100%;background:#7c3aed;border-radius:4px;transition:width .3s}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:#71717a;margin-top:6px}
.btn-primary{display:block;width:100%;padding:16px;background:#7c3aed;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer;margin-top:16px;text-align:center}
.btn-primary:active{background:#6d28d9}
.btn-secondary{display:block;width:100%;padding:14px;background:#27272a;color:#d4d4d8;border:none;border-radius:12px;font-size:15px;cursor:pointer;margin-top:12px;text-align:center}
.btn-complete{background:#059669}
.btn-complete:active{background:#047857}
.streak{text-align:center;color:#a78bfa;font-size:13px;margin:8px 0}
.done-check{text-align:center;margin:20px 0}
.done-check .big{font-size:40px}
.done-check p{color:#71717a;font-size:13px;margin:8px 0}

/* Prayer */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px;color:#71717a}
.topbar a{color:#71717a;text-decoration:none}
.step-icon{font-size:40px;text-align:center;margin:24px 0 12px}
.step-title{font-size:20px;font-weight:700;text-align:center}
.step-subtitle{text-align:center;color:#a78bfa;font-size:12px;margin-top:4px}
.guide-box{background:#18181b;border:1px solid #27272a;border-radius:12px;padding:16px;margin:20px 0;font-size:14px;color:#a1a1aa;line-height:1.7}
.bible-box{background:#18181b;border:1px solid #27272a;border-radius:12px;padding:16px;margin:16px 0;font-size:13px;color:#d4d4d8;line-height:1.8;max-height:280px;overflow-y:auto}
.summary-box{background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.3);border-radius:12px;padding:14px;margin:12px 0}
.summary-box .label{font-size:12px;color:#a78bfa;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.summary-box p{font-size:13px;color:#d4d4d8;line-height:1.6}
.memo{width:100%;background:#18181b;border:1px solid #27272a;border-radius:12px;padding:14px;color:#e4e4e7;font-size:14px;resize:none;outline:none;min-height:90px;font-family:inherit;line-height:1.6}
.memo:focus{border-color:#7c3aed}
.nav-buttons{display:flex;gap:10px;padding:16px 0;margin-top:auto;padding-bottom:max(16px,env(safe-area-inset-bottom))}
.nav-buttons button{flex:1}

/* Complete */
.complete-icon{font-size:56px;text-align:center;margin:40px 0 16px}
.complete-title{font-size:22px;font-weight:700;text-align:center}
.complete-body{text-align:center;color:#a1a1aa;font-size:13px;line-height:1.7;margin:12px 20px 0;max-width:300px;margin-left:auto;margin-right:auto}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:center;margin:20px 0}
.stat-num{font-size:24px;font-weight:700}
.stat-num.purple{color:#a78bfa}
.stat-num.green{color:#34d399}
.stat-label{font-size:11px;color:#71717a;margin-top:4px}
.footer{text-align:center;color:#3f3f46;font-size:11px;margin-top:24px}
</style>
</head>
<body>
<div class="container">

<!-- HOME PAGE -->
<div id="page-home" class="page active">
  <div class="home-icon">📖</div>
  <h1>QT 7분법 기도</h1>
  <p class="subtitle">매일 말씀과 함께하는 기도</p>
  <div class="card">
    <div class="card-label">오늘의 말씀</div>
    <div class="card-title" id="home-chapter"></div>
    <div class="card-sub" id="home-book-progress"></div>
    <div class="progress-label"><span>전체 진행률</span><span id="home-total-progress"></span></div>
    <div class="progress-bar"><div class="progress-fill" id="home-progress-bar"></div></div>
  </div>
  <div class="streak" id="home-streak"></div>
  <div id="home-start">
    <button class="btn-primary" onclick="startPrayer()">기도 시작하기 🙏</button>
  </div>
  <div id="home-done" class="done-check" style="display:none">
    <div class="big">✅</div>
    <p>오늘의 기도를 완료했어요!</p>
    <a href="#" onclick="startPrayer();return false" style="color:#a78bfa;font-size:13px">다시 보기</a>
  </div>
  <p class="footer">매일 1장씩, 성경 전체를 함께 읽어요</p>
</div>

<!-- PRAYER PAGE -->
<div id="page-prayer" class="page">
  <div class="topbar">
    <a href="#" onclick="goHome();return false">← 홈</a>
    <span id="prayer-step-label">묵상</span>
    <span id="prayer-chapter-label"></span>
  </div>
  <div class="progress-bar" style="margin-bottom:8px"><div class="progress-fill" id="prayer-progress"></div></div>

  <div id="prayer-content"></div>

  <div class="nav-buttons">
    <button class="btn-secondary" id="btn-prev" onclick="prevStep()" style="display:none">← 이전</button>
    <button class="btn-primary" id="btn-next" onclick="nextStep()">다음 단계 →</button>
  </div>
</div>

<!-- COMPLETE PAGE -->
<div id="page-complete" class="page">
  <div class="complete-icon" id="comp-emoji"></div>
  <div class="complete-title" id="comp-title"></div>
  <p class="complete-body" id="comp-body"></p>
  <div class="card">
    <div class="stats">
      <div><div class="stat-num purple" id="comp-days"></div><div class="stat-label">기도 완료 일수</div></div>
      <div><div class="stat-num green" id="comp-pct"></div><div class="stat-label">성경 진행률</div></div>
    </div>
  </div>
  <button class="btn-secondary" onclick="goHome()">홈으로 돌아가기</button>
  <p class="footer">내일도 함께 기도해요 🙏</p>
</div>

</div>
<script>
// === Bible Data ===
const BOOKS=[['마태복음','matt',28],['마가복음','mark',16],['누가복음','luke',24],['요한복음','john',21],['사도행전','acts',28],['로마서','rom',16],['고린도전서','1cor',16],['고린도후서','2cor',13],['갈라디아서','gal',6],['에베소서','eph',6],['빌립보서','phil',4],['골로새서','col',4],['데살로니가전서','1thess',5],['데살로니가후서','2thess',3],['디모데전서','1tim',6],['디모데후서','2tim',4],['디도서','titus',3],['빌레몬서','phlm',1],['히브리서','heb',13],['야고보서','jas',5],['베드로전서','1pet',5],['베드로후서','2pet',3],['요한일서','1john',5],['요한이서','2john',1],['요한삼서','3john',1],['유다서','jude',1],['요한계시록','rev',22],['창세기','gen',50],['출애굽기','exod',40],['레위기','lev',27],['민수기','num',36],['신명기','deut',34],['여호수아','josh',24],['사사기','judg',21],['룻기','ruth',4],['사무엘상','1sam',31],['사무엘하','2sam',24],['열왕기상','1kgs',22],['열왕기하','2kgs',25],['역대상','1chr',29],['역대하','2chr',36],['에스라','ezra',10],['느헤미야','neh',13],['에스더','esth',10],['욥기','job',42],['시편','ps',150],['잠언','prov',31],['전도서','eccl',12],['아가','song',8],['이사야','isa',66],['예레미야','jer',52],['예레미야애가','lam',5],['에스겔','ezek',48],['다니엘','dan',12],['호세아','hos',14],['요엘','joel',3],['아모스','amos',9],['오바댜','obad',1],['요나','jonah',4],['미가','mic',7],['나훔','nah',3],['하박국','hab',3],['스바냐','zeph',3],['학개','hag',2],['스가랴','zech',14],['말라기','mal',4]];
const ALL=[];let idx=0;BOOKS.forEach(([ko,en,tc])=>{const s=ko==='마태복음'?2:1;for(let c=s;c<=tc;c++){ALL.push({ko,en,ch:c,tc,gi:idx++})}});
const TOTAL=ALL.length;

const STEPS=[
{id:1,title:'묵상',sub:'Meditation',icon:'📖',guide:'오늘의 말씀을 천천히 읽고, 하나님이 내게 하시는 말씀을 묵상하세요.',ph:'말씀을 통해 느낀 점을 적어보세요...'},
{id:2,title:'찬양과 경배',sub:'Praise & Worship',icon:'🎵',guide:'하나님의 위대하심과 선하심을 찬양하며, 마음을 다해 경배하세요.',ph:'하나님께 드리는 찬양과 경배를 적어보세요...'},
{id:3,title:'감사',sub:'Thanksgiving',icon:'🙏',guide:'오늘 감사한 것들을 하나하나 떠올리며 감사를 고백하세요.',ph:'감사한 것들을 적어보세요...'},
{id:4,title:'회개',sub:'Repentance',icon:'💧',guide:'마음을 돌아보며, 하나님 앞에서 부족했던 점을 회개하세요.',ph:'회개하고 싶은 것들을 적어보세요...'},
{id:5,title:'간구',sub:'Supplication',icon:'🙌',guide:'개인적으로 필요한 것들을 하나님께 구하세요.',ph:'기도 제목을 적어보세요...'},
{id:6,title:'중보기도',sub:'Intercession',icon:'🤝',guide:'가족, 친구, 이웃, 나라를 위해 기도하세요.',ph:'누구를 위해 기도하나요?'},
{id:7,title:'특별대상을 위한 기도',sub:'Special Prayer',icon:'🌟',guide:'특별히 마음에 두고 있는 사람이나 상황을 위해 기도하세요.',ph:'특별 기도 대상과 내용을 적어보세요...'}
];

const MSGS=[
{e:'✨',t:'오늘도 수고했어요!',b:'"항상 기뻐하라 쉬지 말고 기도하라 범사에 감사하라" (살전 5:16-18)'},
{e:'🌅',t:'아름다운 하루!',b:'"의인의 간구는 역사하는 힘이 큼이라" (약 5:16)'},
{e:'💪',t:'잘 하고 있어요!',b:'"너희는 이 세대를 본받지 말고 오직 마음을 새롭게 함으로 변화를 받아" (롬 12:2)'},
{e:'🕊️',t:'평안이 함께하길!',b:'"아무 것도 염려하지 말고 다만 모든 일에 기도와 간구로" (빌 4:6)'},
{e:'🌿',t:'은혜로운 시간이었어요!',b:'"시냇가에 심은 나무가 철을 따라 열매를 맺으며" (시 1:3)'},
{e:'🔥',t:'뜨거운 기도였어요!',b:'"너희가 내 이름으로 무엇을 구하든지 내가 행하리니" (요 14:13)'},
{e:'⭐',t:'빛나는 하루!',b:'"너희는 세상의 빛이라" (마 5:14)'},
{e:'🌈',t:'소망을 품고!',b:'"소망의 하나님이 모든 기쁨과 평강을 믿음 안에서 너희에게 충만하게 하사" (롬 15:13)'},
{e:'💝',t:'사랑받고 있어요!',b:'"내가 너를 사랑하는 것 같이 너희도 서로 사랑하라" (요 13:34)'},
{e:'🌻',t:'감사한 하루!',b:'"여호와를 기뻐하라 그가 네 마음의 소원을 이루어 주시리로다" (시 37:4)'},
{e:'🙏',t:'기도의 용사!',b:'"모든 기도와 간구를 하되 항상 성령 안에서 기도하고" (엡 6:18)'},
{e:'🎯',t:'오늘도 승리!',b:'"우리를 사랑하시는 이로 말미암아 우리가 넉넉히 이기느니라" (롬 8:37)'},
];

// === Helpers ===
const today=()=>new Date().toISOString().split('T')[0];
const lsGet=(k)=>localStorage.getItem('qt-'+k)||'';
const lsSet=(k,v)=>localStorage.setItem('qt-'+k,v);

function getChapter(){
  const start=new Date(lsGet('start')||'2026-04-13');
  const now=new Date();start.setHours(0,0,0,0);now.setHours(0,0,0,0);
  const d=Math.floor((now-start)/(864e5));
  return ALL[((d%TOTAL)+TOTAL)%TOTAL];
}
function getHistory(){try{return JSON.parse(lsGet('history')||'[]')}catch{return[]}}
function markDone(){const h=getHistory();const t=today();if(!h.includes(t)){h.push(t);lsSet('history',JSON.stringify(h))}}

// === State ===
let currentStep=0; // 0=bible, 1-7=steps
let chapter=null;
let bibleText='';

// === Pages ===
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}

function goHome(){
  showPage('home');
  chapter=getChapter();
  const h=getHistory();
  document.getElementById('home-chapter').textContent=chapter.ko+' '+chapter.ch+'장';
  document.getElementById('home-book-progress').textContent=chapter.ko+' '+chapter.ch+'/'+chapter.tc+'장';
  document.getElementById('home-total-progress').textContent=(chapter.gi+1)+' / '+TOTAL;
  document.getElementById('home-progress-bar').style.width=((chapter.gi+1)/TOTAL*100)+'%';
  if(h.length>0)document.getElementById('home-streak').textContent='🔥 '+h.length+'일 기도 완료';
  const done=h.includes(today());
  document.getElementById('home-start').style.display=done?'none':'block';
  document.getElementById('home-done').style.display=done?'block':'none';
}

function startPrayer(){
  currentStep=0;
  chapter=getChapter();
  showPage('prayer');
  document.getElementById('prayer-chapter-label').textContent=chapter.ko+' '+chapter.ch+'장';
  fetchBible();
  renderStep();
}

async function fetchBible(){
  try{
    const r=await fetch('https://bible-api.com/'+chapter.en+'+'+chapter.ch+'?translation=kr');
    if(r.ok){const d=await r.json();bibleText=d.text||'';}
    else bibleText='';
  }catch{bibleText='';}
  if(currentStep===0)renderStep();
}

function renderStep(){
  const content=document.getElementById('prayer-content');
  const prog=document.getElementById('prayer-progress');
  const label=document.getElementById('prayer-step-label');
  const btnPrev=document.getElementById('btn-prev');
  const btnNext=document.getElementById('btn-next');

  prog.style.width=((currentStep+1)/8*100)+'%';
  btnPrev.style.display=currentStep>0?'block':'none';

  if(currentStep<7){
    btnNext.textContent='다음 단계 →';
    btnNext.className='btn-primary';
    btnNext.onclick=nextStep;
  }else{
    btnNext.textContent='기도 완료 ✓';
    btnNext.className='btn-primary btn-complete';
    btnNext.onclick=completePrayer;
  }

  const t=today();
  if(currentStep===0){
    label.textContent='묵상';
    const txt=bibleText||chapter.ko+' '+chapter.ch+'장의 말씀을 묵상하세요.\n\n(성경책을 펴고 읽어주세요.)';
    const summary=bibleText
      ? chapter.ko+' '+chapter.ch+'장: '+bibleText.substring(0,150).replace(/\n/g,' ')+'... 하나님의 뜻을 깊이 묵상해 보세요.'
      : chapter.ko+' '+chapter.ch+'장을 천천히 읽고 하나님의 음성에 귀 기울여 보세요.';
    const memo=lsGet('memo-'+t+'-0')||'';
    content.innerHTML=`
      <div class="step-icon">📖</div>
      <div class="step-title">${chapter.ko} ${chapter.ch}장</div>
      <p class="subtitle" style="margin:4px 0 0">오늘의 말씀을 묵상하세요</p>
      <div class="bible-box">${txt.replace(/\n/g,'<br>')}</div>
      <div class="summary-box"><div class="label">🤖 요약</div><p>${summary}</p></div>
      <textarea class="memo" placeholder="말씀을 통해 느낀 점을 적어보세요..." oninput="saveMemo(0,this.value)">${memo}</textarea>`;
  }else{
    const s=STEPS[currentStep-1];
    label.textContent=currentStep+'/7';
    const memo=lsGet('memo-'+t+'-'+s.id)||'';
    content.innerHTML=`
      <div class="step-icon">${s.icon}</div>
      <div class="step-title">${s.title}</div>
      <div class="step-subtitle">${s.sub}</div>
      <div class="guide-box">${s.guide}</div>
      <textarea class="memo" placeholder="${s.ph}" oninput="saveMemo(${s.id},this.value)">${memo}</textarea>`;
  }
}

function saveMemo(id,val){lsSet('memo-'+today()+'-'+id,val)}
function nextStep(){if(currentStep<7){currentStep++;renderStep();window.scrollTo(0,0)}}
function prevStep(){if(currentStep>0){currentStep--;renderStep();window.scrollTo(0,0)}}

function completePrayer(){
  markDone();
  showPage('complete');
  const m=MSGS[new Date().getDate()%MSGS.length];
  const h=getHistory();
  document.getElementById('comp-emoji').textContent=m.e;
  document.getElementById('comp-title').textContent=m.t;
  document.getElementById('comp-body').textContent=m.b;
  document.getElementById('comp-days').textContent=h.length;
  document.getElementById('comp-pct').textContent=((chapter.gi+1)/TOTAL*100).toFixed(1)+'%';
}

// Init
goHome();
</script>
</body>
</html>
