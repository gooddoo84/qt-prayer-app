<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>QT 7분법 기도</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'Segoe UI',system-ui,'Helvetica Neue',sans-serif;
  background:linear-gradient(160deg,#faf7f2 0%,#f5f0e8 40%,#f3ece0 100%);
  color:#2d2a24;
  min-height:100dvh;
  -webkit-user-select:none;user-select:none;
  overflow-x:hidden;
}
textarea{-webkit-user-select:text;user-select:text}

/* Floating decorative elements */
body::before, body::after {
  content:'✦';
  position:fixed;
  font-size:120px;
  opacity:.03;
  pointer-events:none;
  z-index:0;
  color:#b8860b;
}
body::before { top:-20px; right:-30px; animation: floatDeco 12s ease-in-out infinite; }
body::after { bottom:60px; left:-40px; animation: floatDeco 15s ease-in-out infinite reverse; }

@keyframes floatDeco {
  0%,100%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(-20px) rotate(8deg)}
}

/* === Container === */
.container{
  max-width:440px;margin:0 auto;padding:16px 20px;
  min-height:100dvh;display:flex;flex-direction:column;
  position:relative;z-index:1;
}
.page{display:none;flex:1;flex-direction:column;opacity:0;transform:translateY(18px)}
.page.active{display:flex;animation:pageIn .5s cubic-bezier(.22,1,.36,1) forwards}

@keyframes pageIn{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes bounceIn{
  0%{opacity:0;transform:scale(.3)}
  50%{transform:scale(1.08)}
  70%{transform:scale(.95)}
  100%{opacity:1;transform:scale(1)}
}
@keyframes fadeInLine{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes goldGlow{
  0%,100%{box-shadow:0 0 0 3px rgba(184,134,11,.12),0 2px 12px rgba(0,0,0,.04)}
  50%{box-shadow:0 0 0 5px rgba(218,165,32,.18),0 2px 16px rgba(184,134,11,.08)}
}
@keyframes confettiFall{
  0%{transform:translateY(-100%) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}
@keyframes starFall{
  0%{transform:translateY(-10px);opacity:0}
  10%{opacity:1}
  90%{opacity:.6}
  100%{transform:translateY(105vh);opacity:0}
}
@keyframes celebratePulse{
  0%,100%{transform:scale(1)}
  25%{transform:scale(1.1)}
  50%{transform:scale(1.05)}
  75%{transform:scale(1.08)}
}

/* === Home Page === */
.home-icon{
  font-size:56px;text-align:center;margin:48px 0 20px;
  animation:float 3s ease-in-out infinite;
  filter:drop-shadow(0 4px 12px rgba(184,134,11,.25));
}
h1{
  font-family:'Noto Serif KR',Georgia,'Times New Roman',serif;
  font-size:28px;text-align:center;font-weight:700;
  color:#2d2a24;
  letter-spacing:1px;
}
.subtitle{
  text-align:center;color:#8b7759;
  font-size:14px;margin-top:6px;letter-spacing:.5px;
}

/* Cards */
.card{
  background:#ffffff;
  border:1px solid #e8dcc8;
  border-radius:20px;padding:24px;margin:24px 0;
  box-shadow:0 8px 32px rgba(139,119,89,.08),0 2px 8px rgba(139,119,89,.04);
  position:relative;
  overflow:hidden;
  transition:transform .25s ease,box-shadow .25s ease;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#b8860b,#daa520,#b8860b);
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 40px rgba(139,119,89,.12),0 4px 12px rgba(139,119,89,.06);
}
.card-label{
  font-size:11px;color:#b8860b;
  text-transform:uppercase;letter-spacing:2px;font-weight:600;
}
.card-title{
  font-family:'Noto Serif KR',Georgia,serif;
  font-size:24px;font-weight:700;margin:8px 0 6px;color:#2d2a24;
}
.card-sub{font-size:13px;color:#8b7759}

/* Progress bar */
.progress-bar{
  width:100%;height:6px;
  background:#ede5d8;
  border-radius:6px;margin-top:14px;overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:6px;
  background:linear-gradient(90deg,#b8860b,#daa520,#b8860b);
  background-size:200% auto;
  animation:shimmer 3s linear infinite;
  transition:width .5s cubic-bezier(.4,0,.2,1);
}
.progress-label{
  display:flex;justify-content:space-between;
  font-size:11px;color:#8b7759;margin-top:8px;
}

/* Buttons */
.btn-primary{
  display:block;width:100%;padding:17px;
  background:linear-gradient(135deg,#daa520 0%,#b8860b 100%);
  color:#ffffff;border:none;border-radius:14px;
  font-size:17px;font-weight:700;cursor:pointer;
  margin-top:16px;text-align:center;
  box-shadow:0 4px 20px rgba(184,134,11,.3);
  transition:all .25s cubic-bezier(.22,1,.36,1);
  letter-spacing:.5px;
  position:relative;
  overflow:hidden;
}
.btn-primary::after{
  content:'';position:absolute;top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  transition:left .5s;
}
.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(184,134,11,.4);
}
.btn-primary:hover::after{left:100%}
.btn-primary:active{
  transform:translateY(0) scale(.97);
  background:linear-gradient(135deg,#b8860b 0%,#8b6914 100%);
  box-shadow:0 2px 12px rgba(184,134,11,.3);
}
.btn-secondary{
  display:block;width:100%;padding:15px;
  background:#ffffff;
  color:#4a4035;
  border:1px solid #e8dcc8;
  border-radius:14px;font-size:15px;font-weight:500;
  cursor:pointer;margin-top:12px;text-align:center;
  transition:all .25s cubic-bezier(.22,1,.36,1);
  box-shadow:0 2px 8px rgba(139,119,89,.06);
}
.btn-secondary:hover{
  background:#faf7f2;
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(139,119,89,.1);
}
.btn-secondary:active{
  background:#f3ece0;
  transform:scale(.97);
}

.btn-complete{
  background:linear-gradient(135deg,#34d399 0%,#059669 100%);
  color:#ffffff;
  box-shadow:0 4px 20px rgba(52,211,153,.35);
}
.btn-complete:hover{
  box-shadow:0 8px 32px rgba(52,211,153,.45);
}
.btn-complete:active{background:linear-gradient(135deg,#059669 0%,#047857 100%)}

/* Streak */
.streak{
  text-align:center;color:#b8860b;
  font-size:14px;margin:10px 0;font-weight:600;
}

/* Done check */
.done-check{text-align:center;margin:24px 0}
.done-check .big{font-size:48px}
.done-check p{color:#8b7759;font-size:14px;margin:10px 0}

/* Name input */
.name-input{
  width:100%;padding:15px;
  background:#ffffff;
  border:1px solid #e8dcc8;
  border-radius:14px;font-size:15px;
  text-align:center;outline:none;
  color:#2d2a24;margin-bottom:14px;
  transition:border-color .3s,box-shadow .3s;
  box-shadow:0 2px 8px rgba(139,119,89,.04);
}
.name-input::placeholder{color:#b5a78e}
.name-input:focus{
  border-color:#daa520;
  animation:goldGlow 2s ease-in-out infinite;
}

/* === Prayer Page === */
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;font-size:13px;color:#8b7759;
}
.topbar a{
  color:#8b7759;text-decoration:none;
  font-weight:500;transition:color .2s;
  padding:4px 0;
}
.topbar a:hover{color:#b8860b}

/* Step header */
.step-icon{
  font-size:52px;text-align:center;margin:20px 0 14px;
  width:80px;height:80px;
  display:flex;align-items:center;justify-content:center;
  margin-left:auto;margin-right:auto;
  background:#ffffff;
  border-radius:24px;
  border:1px solid #e8dcc8;
  box-shadow:0 4px 16px rgba(139,119,89,.08);
  animation:bounceIn .6s cubic-bezier(.22,1,.36,1);
}
.step-title{
  font-family:'Noto Serif KR',Georgia,serif;
  font-size:22px;font-weight:700;text-align:center;color:#2d2a24;
}
.step-subtitle{
  text-align:center;color:#b8860b;
  font-size:12px;margin-top:6px;
  letter-spacing:1px;text-transform:uppercase;font-weight:500;
}

/* Guide box */
.guide-box{
  background:#ffffff;
  border:1px solid #e8dcc8;
  border-radius:16px;
  padding:20px;margin:20px 0;
  font-size:14.5px;color:#4a4035;line-height:1.85;
  box-shadow:0 4px 24px rgba(139,119,89,.06);
  border-left:4px solid #daa520;
  position:relative;
}

/* Bible text */
.bible-box{
  background:#ffffff;
  border:1px solid #e8dcc8;
  border-radius:16px;
  padding:22px 20px;margin:16px 0;
  font-family:'Noto Serif KR',Georgia,'Times New Roman',serif;
  font-size:15px;color:#374151;line-height:2.1;
  max-height:50vh;overflow-y:auto;
  box-shadow:0 4px 24px rgba(139,119,89,.06);
  border-top:3px solid #daa520;
}
.bible-box::-webkit-scrollbar{width:4px}
.bible-box::-webkit-scrollbar-track{background:transparent}
.bible-box::-webkit-scrollbar-thumb{background:rgba(184,134,11,.3);border-radius:4px}

/* Summary / meditation box */
.summary-box{
  background:#ffffff;
  border:1px solid #e8dcc8;
  border-radius:16px;
  padding:22px 20px;margin:16px 0;
  box-shadow:0 4px 24px rgba(139,119,89,.06);
  border-left:4px solid #b8860b;
}
.summary-box .label{
  font-size:14px;color:#b8860b;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;font-weight:700;
}
.summary-box p{font-size:13.5px;color:#374151;line-height:1.75}
.summary-box b{color:#8b6914;font-size:14.5px;display:inline-block;margin-top:6px}

/* Memo textarea */
.memo{
  width:100%;
  background:#ffffff;
  border:2px solid #e8dcc8;
  border-radius:16px;padding:16px 18px;
  color:#2d2a24;font-size:15px;
  resize:none;outline:none;
  min-height:100px;font-family:inherit;line-height:1.7;
  transition:border-color .3s,box-shadow .3s;
  box-shadow:0 2px 12px rgba(139,119,89,.04);
}
.memo::placeholder{color:#b5a78e}
.memo:focus{
  border-color:#daa520;
  animation:goldGlow 2s ease-in-out infinite;
}

/* Nav buttons */
.nav-buttons{
  display:flex;gap:12px;padding:16px 0;
  margin-top:auto;
  padding-bottom:max(16px,env(safe-area-inset-bottom));
}
.nav-buttons button{flex:1;font-weight:600}

/* === Complete Page === */
.complete-icon{
  font-size:64px;text-align:center;margin:40px 0 20px;
  animation:celebratePulse 2s ease-in-out infinite;
}
.complete-title{
  font-family:'Noto Serif KR',Georgia,serif;
  font-size:24px;font-weight:700;text-align:center;color:#2d2a24;
}
.complete-body{
  text-align:center;color:#5a5347;
  font-size:14px;line-height:1.85;
  margin:14px auto 0;max-width:320px;
}

/* Stats */
.stats{
  display:grid;grid-template-columns:1fr 1fr;gap:16px;
  text-align:center;margin:20px 0;
}
.stat-num{font-size:28px;font-weight:800}
.stat-num.purple{color:#b8860b}
.stat-num.green{color:#059669}
.stat-label{font-size:11px;color:#8b7759;margin-top:6px;letter-spacing:.5px}

/* Footer */
.footer{
  text-align:center;color:#b5a78e;
  font-size:12px;margin-top:28px;letter-spacing:.5px;
}

/* Completion memo card */
#comp-memos{
  background:#ffffff;
  border:1px solid #e8dcc8;
  border-radius:16px;
  padding:24px 20px;
  box-shadow:0 4px 24px rgba(139,119,89,.06);
}

/* Confetti particles */
.confetti-container{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:999;overflow:hidden;
}
.confetti{
  position:absolute;width:10px;height:10px;
  border-radius:2px;
  animation:confettiFall 3s linear forwards;
}
</style>
</head>
<body>
<div class="container">

<!-- HOME PAGE -->
<div id="page-home" class="page active" style="position:relative;overflow:hidden">
  <!-- 별빛 파티클 -->
  <div id="stars-container" style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;z-index:0"></div>
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;z-index:1">
    <div style="font-size:64px;margin-bottom:12px;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 4px 16px rgba(184,134,11,.2))">✝️</div>
    <h1 style="font-size:32px;margin-bottom:4px">QT 7분법 기도</h1>
    <p class="subtitle" style="font-size:15px;margin-bottom:24px">매일 말씀과 함께하는 기도</p>

    <div style="background:linear-gradient(135deg,rgba(184,134,11,.08),rgba(218,165,32,.12));border:1px solid rgba(184,134,11,.2);border-radius:16px;padding:20px 28px;margin-bottom:28px;width:100%">
      <div id="home-date" style="font-family:'Noto Serif KR',Georgia,serif;font-size:20px;font-weight:700;color:#2d2a24;margin-bottom:4px"></div>
      <div style="font-size:13px;color:#8b7759;letter-spacing:1px" id="home-day-label"></div>
    </div>

    <div style="width:100%;margin-bottom:8px">
      <div class="card" style="margin:0">
        <div class="card-label">✦ QUIET TIME</div>
        <div class="card-title" id="home-chapter" style="display:none"></div>
        <div class="card-sub" id="home-book-progress" style="display:none"></div>
        <div class="progress-bar" style="display:none"><div class="progress-fill" id="home-progress-bar" style="width:0%"></div></div>
        <div class="progress-label" style="display:none"><span id="home-total-progress"></span><span></span></div>
        <p style="font-size:14px;color:#5a5347;line-height:1.7;margin-top:8px">오늘도 하나님과 함께하는<br>은혜로운 시간을 시작하세요</p>
      </div>
    </div>
  </div>

  <div id="home-start" style="padding-bottom:20px">
    <input type="hidden" id="user-name" value="">
    <button class="btn-primary" onclick="startPrayer()" style="font-size:18px;padding:18px">✝️ 기도 시작</button>
  </div>
  <div id="home-done" class="done-check" style="display:none">
    <div class="big">✅</div>
    <p>오늘의 기도를 완료했어요!</p>
    <a href="#" onclick="startPrayer();return false" style="color:#b8860b;font-size:14px;font-weight:500">다시 보기</a>
  </div>
  <p class="streak" id="home-streak" style="display:none"></p>
</div>

<!-- PRAYER PAGE -->
<div id="page-prayer" class="page">
  <div class="topbar">
    <a href="#" onclick="goHome();return false">← 홈</a>
    <span id="prayer-step-label" style="color:#b8860b;font-weight:600">묵상</span>
    <span id="prayer-chapter-label" style="color:#8b7759"></span>
  </div>
  <div class="progress-bar" style="margin-bottom:12px"><div class="progress-fill" id="prayer-progress"></div></div>

  <div id="prayer-content"></div>

  <div class="nav-buttons">
    <button class="btn-secondary" id="btn-prev" onclick="prevStep()" style="display:none">← 이전</button>
    <button class="btn-primary" id="btn-next" onclick="nextStep()">다음 단계 →</button>
  </div>
</div>

<!-- COMPLETE PAGE -->
<div id="page-complete" class="page">
  <div class="complete-icon" id="comp-emoji"></div>
  <div class="complete-title" id="comp-title"></div>
  <p class="complete-body" id="comp-body"></p>
  <div class="card">
    <div class="stats">
      <div><div class="stat-num purple" id="comp-days"></div><div class="stat-label">기도 완료 일수</div></div>
      <div><div class="stat-num green" id="comp-pct"></div><div class="stat-label">성경 진행률</div></div>
    </div>
  </div>
  <!-- 오늘의 기도 기록 -->
  <div id="comp-memos" class="card" style="text-align:left;margin-top:12px;color:#374151"></div>
  <button class="btn-primary" onclick="downloadMemoImage()" style="margin-top:14px">기도 기록 저장 📷</button>
  <button class="btn-secondary" onclick="goHome()">홈으로 돌아가기</button>
  <p class="footer">내일도 함께 기도해요</p>
</div>
<!-- Hidden canvas for image generation -->
<canvas id="memo-canvas" style="display:none"></canvas>

</div>
<script>
// === Bible Data ===
const BOOKS=[['마태복음','matt',28],['마가복음','mark',16],['누가복음','luke',24],['요한복음','john',21],['사도행전','acts',28],['로마서','rom',16],['고린도전서','1cor',16],['고린도후서','2cor',13],['갈라디아서','gal',6],['에베소서','eph',6],['빌립보서','phil',4],['골로새서','col',4],['데살로니가전서','1thess',5],['데살로니가후서','2thess',3],['디모데전서','1tim',6],['디모데후서','2tim',4],['디도서','titus',3],['빌레몬서','phlm',1],['히브리서','heb',13],['야고보서','jas',5],['베드로전서','1pet',5],['베드로후서','2pet',3],['요한일서','1john',5],['요한이서','2john',1],['요한삼서','3john',1],['유다서','jude',1],['요한계시록','rev',22],['창세기','gen',50],['출애굽기','exod',40],['레위기','lev',27],['민수기','num',36],['신명기','deut',34],['여호수아','josh',24],['사사기','judg',21],['룻기','ruth',4],['사무엘상','1sam',31],['사무엘하','2sam',24],['열왕기상','1kgs',22],['열왕기하','2kgs',25],['역대상','1chr',29],['역대하','2chr',36],['에스라','ezra',10],['느헤미야','neh',13],['에스더','esth',10],['욥기','job',42],['시편','ps',150],['잠언','prov',31],['전도서','eccl',12],['아가','song',8],['이사야','isa',66],['예레미야','jer',52],['예레미야애가','lam',5],['에스겔','ezek',48],['다니엘','dan',12],['호세아','hos',14],['요엘','joel',3],['아모스','amos',9],['오바댜','obad',1],['요나','jonah',4],['미가','mic',7],['나훔','nah',3],['하박국','hab',3],['스바냐','zeph',3],['학개','hag',2],['스가랴','zech',14],['말라기','mal',4]];
const ALL=[];let idx=0;BOOKS.forEach(([ko,en,tc])=>{const s=ko==='마태복음'?2:1;for(let c=s;c<=tc;c++){ALL.push({ko,en,ch:c,tc,gi:idx++})}});
const TOTAL=ALL.length;

function getChapter(){
  const now = new Date();
  const m = now.getMonth() + 1;
  const d = now.getDate();
  const key = m + '-' + d;
  const plan = YEARLY_PLAN[key];

  if (plan) {
    // "시 29:1-11" → 파싱
    const match = plan.match(/^(\S+)\s+(\d+):(.+)$/);
    if (match) {
      const abbr = match[1];
      const ch = parseInt(match[2]);
      const verses = match[3]; // "1-11" or "1-6"
      const en = KO_TO_EN[abbr] || abbr;
      const ko = KO_FULL[abbr] || abbr;
      return { ko, en, ch, tc: ch, gi: 0, verses };
    }
  }

  // fallback: 기존 순차 방식
  const start=new Date(lsGet('start')||'2026-04-13');
  start.setHours(0,0,0,0);now.setHours(0,0,0,0);
  const dd=Math.floor((now-start)/(864e5));
  return ALL[((dd%TOTAL)+TOTAL)%TOTAL];
}

function generateMeditation(ch, text) {
  const lines = text.split('\n').filter(l=>l.trim());
  const clean = v=>v.replace(/^\d+\.\s*/,'').trim();
  const name = ch.ko+' '+ch.ch+'장';

  // Parse verses into array of {num, text}
  const verses = lines.map(l => {
    const m = l.match(/^(\d+)\.\s*(.*)/);
    return m ? {num:parseInt(m[1]), text:m[2].trim()} : {num:0, text:l.trim()};
  }).filter(v=>v.text);

  // Pick key verses - choose substantive ones (longer text, not just names/genealogy)
  const substantive = verses.filter(v=>v.text.length>20 && !v.text.match(/^[가-힣]+[이가은는]$/));
  const keyVerses = [];
  if(substantive.length>=3) {
    // Pick from beginning, middle, end thirds
    const third = Math.floor(substantive.length/3);
    keyVerses.push(substantive[Math.min(1,third-1)]);
    keyVerses.push(substantive[third + Math.floor(third/2)]);
    keyVerses.push(substantive[Math.min(third*2 + Math.floor(third/2), substantive.length-1)]);
  } else {
    substantive.forEach(v=>keyVerses.push(v));
    while(keyVerses.length<2 && verses.length>0) keyVerses.push(verses[Math.floor(verses.length/2)]);
  }

  // Extract people
  const people = [];
  const pMatch = text.match(/예수|그리스도|모세|다윗|아브라함|야곱|요셉|바울|베드로|엘리야|엘리사|사울|솔로몬|여호수아|이삭|사무엘|느헤미야|에스더|룻|다니엘|요나|마리아|헤롯|빌라도|니고데모|삭개오|기드온|삼손|라합|한나|드보라|에스겔|이사야|예레미야|호세아|미가|하박국|요한|마태|누가|마가|디모데|디도|브리스길라|아굴라/g);
  if(pMatch) pMatch.forEach(p=>{if(!people.includes(p))people.push(p)});

  // Extract places
  const places = [];
  const plMatch = text.match(/예루살렘|베들레헴|이집트|애굽|가나안|바벨론|갈릴리|나사렛|시내산|요단|시온|다메섹|고린도|로마|안디옥|니느웨|사마리아|벧엘|길갈|여리고|성전|회당|광야|바다/g);
  if(plMatch) plMatch.forEach(p=>{if(!places.includes(p))places.push(p)});

  // Detect themes with specific verse references
  const themes = [];
  verses.forEach(v => {
    const t = v.text;
    if(t.match(/왕|나라|통치|다스리|보좌|권세|다스림/)) themes.push({cat:'kingdom',v});
    if(t.match(/두려|무서|걱정|염려|떨며|두렵/)) themes.push({cat:'fear',v});
    if(t.match(/사랑|긍휼|은혜|자비|돌보|사랑하/)) themes.push({cat:'love',v});
    if(t.match(/믿음|신뢰|의지|의롭|믿으/)) themes.push({cat:'faith',v});
    if(t.match(/순종|명령|계명|지키|따르라/)) themes.push({cat:'obey',v});
    if(t.match(/죄|악|회개|용서|돌이키|범죄/)) themes.push({cat:'repent',v});
    if(t.match(/감사|찬양|영광|높이|노래하/)) themes.push({cat:'praise',v});
    if(t.match(/소망|희망|기다|인내|참으/)) themes.push({cat:'hope',v});
    if(t.match(/구원|구하|건지|살리|십자가|대속/)) themes.push({cat:'salvation',v});
    if(t.match(/평안|평화|쉼|안식|평강/)) themes.push({cat:'peace',v});
    if(t.match(/치유|고치|낫게|병|아픔|고침/)) themes.push({cat:'healing',v});
    if(t.match(/기도|간구|부르짖|무릎|구하/)) themes.push({cat:'prayer',v});
    if(t.match(/지혜|총명|깨달|분별|명철/)) themes.push({cat:'wisdom',v});
    if(t.match(/약속|언약|맹세/)) themes.push({cat:'promise',v});
    if(t.match(/제자|섬기|봉사|사역|종/)) themes.push({cat:'serve',v});
    if(t.match(/심판|징계|경고|멸망|진노/)) themes.push({cat:'judgment',v});

  // Get unique theme categories, pick top 3 by frequency

  themes.forEach(t => { themeCounts[t.cat] = (themeCounts[t.cat]||0) + 1; });

    praise: {name:'찬양과 감사', reflect:'환경이 어려울 때에도 하나님을 찬양할 수 있는지, 오늘 감사할 수 있는 구체적인 것 세 가지는 무엇인지'},

    salvation: {name:'구원', reflect:'구원의 은혜가 내 일상에서 어떻게 살아 있는지, 이 놀라운 은혜를 당연하게 여기고 있지는 않는지'},
    peace: {name:'참된 평안', reflect:'지금 나의 마음에 평안이 있는지, 평안을 빼앗기고 있다면 그 원인이 무엇인지'},
    healing: {name:'치유', reflect:'내 안에 치유받아야 할 상처가 있는지, 하나님의 치유하시는 손길을 믿고 그 아픔을 내려놓을 수 있는지'},

    wisdom: {name:'지혜', reflect:'최근 중요한 결정 앞에서 하나님의 지혜를 구했는지, 세상의 기준이 아닌 하나님의 관점으로 상황을 바라보고 있는지'},

    serve: {name:'섬김', reflect:'나는 누구를 섬기고 있는지, 섬김이 의무가 아닌 기쁨이 되려면 내 마음에 어떤 변화가 필요한지'},

  let p = '';

let sectionLabel=''; // e.g. "1-12절"

// === Pages ===
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}

function goHome(){
  showPage('home');
  chapter=getChapter();
  const h=getHistory();
  // 오늘 날짜 표시
  const now = new Date();
  const days = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
  document.getElementById('home-date').textContent = now.getFullYear()+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일';
  document.getElementById('home-day-label').textContent = days[now.getDay()];
  
  // Always show start button
  document.getElementById('home-start').style.display='block';
  document.getElementById('home-done').style.display='none';
  // Restore saved name
  const savedName=lsGet('username');
  if(savedName) document.getElementById('user-name').value=savedName;

  // 별빛 파티클 생성
  const sc=document.getElementById('stars-container');
  if(sc && sc.children.length===0){
    for(let i=0;i<25;i++){
      const s=document.createElement('div');
      const size=Math.random()*3+1;
      s.style.cssText='position:absolute;border-radius:50%;background:rgba(218,165,32,'+(Math.random()*0.4+0.2)+');width:'+size+'px;height:'+size+'px;left:'+Math.random()*100+'%;top:-5%;animation:starFall '+(Math.random()*6+4)+'s linear '+(Math.random()*8)+'s infinite;';
      sc.appendChild(s);
    }
  }
}

function getUserName(){
  const el=document.getElementById('user-name');
  const name=(el?el.value:'').trim();
  if(name) lsSet('username',name);
  return name;
}
