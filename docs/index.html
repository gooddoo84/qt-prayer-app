<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>QT 7분법 기도</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#f8f8f8;color:#1a1a1a;min-height:100dvh;-webkit-user-select:none;user-select:none}
textarea{-webkit-user-select:text;user-select:text}
.container{max-width:440px;margin:0 auto;padding:20px;min-height:100dvh;display:flex;flex-direction:column}
.page{display:none;flex:1;flex-direction:column}
.page.active{display:flex}

/* Home */
.home-icon{font-size:48px;text-align:center;margin:40px 0 16px}
h1{font-size:22px;text-align:center;font-weight:700}
.subtitle{text-align:center;color:#6b7280;font-size:13px;margin-top:4px}
.card{background:#ffffff;border:1px solid #e4e4e7;border-radius:16px;padding:20px;margin:24px 0}
.card-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px}
.card-title{font-size:22px;font-weight:700;margin:6px 0 4px}
.card-sub{font-size:13px;color:#6b7280}
.progress-bar{width:100%;height:5px;background:#e4e4e7;border-radius:4px;margin-top:12px;overflow:hidden}
.progress-fill{height:100%;background:#6d28d9;border-radius:4px;transition:width .3s}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:#6b7280;margin-top:6px}
.btn-primary{display:block;width:100%;padding:16px;background:#6d28d9;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer;margin-top:16px;text-align:center}
.btn-primary:active{background:#5b21b6}
.btn-secondary{display:block;width:100%;padding:14px;background:#e4e4e7;color:#374151;border:none;border-radius:12px;font-size:15px;cursor:pointer;margin-top:12px;text-align:center}
.btn-complete{background:#059669}
.btn-complete:active{background:#047857}
.streak{text-align:center;color:#a78bfa;font-size:13px;margin:8px 0}
.done-check{text-align:center;margin:20px 0}
.done-check .big{font-size:40px}
.done-check p{color:#6b7280;font-size:13px;margin:8px 0}

/* Prayer */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px;color:#6b7280}
.topbar a{color:#6b7280;text-decoration:none}
.step-icon{font-size:40px;text-align:center;margin:24px 0 12px}
.step-title{font-size:20px;font-weight:700;text-align:center}
.step-subtitle{text-align:center;color:#a78bfa;font-size:12px;margin-top:4px}
.guide-box{background:#ffffff;border:1px solid #e4e4e7;border-radius:12px;padding:16px;margin:20px 0;font-size:14px;color:#4b5563;line-height:1.7}
.bible-box{background:#ffffff;border:1px solid #e4e4e7;border-radius:12px;padding:16px;margin:16px 0;font-size:13px;color:#374151;line-height:1.8;max-height:280px;overflow-y:auto}
.summary-box{background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.2);border-radius:12px;padding:14px;margin:12px 0}
.summary-box .label{font-size:12px;color:#a78bfa;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.summary-box p{font-size:13px;color:#374151;line-height:1.6}
.memo{width:100%;background:#ffffff;border:1px solid #e4e4e7;border-radius:12px;padding:14px;color:#1f2937;font-size:14px;resize:none;outline:none;min-height:90px;font-family:inherit;line-height:1.6}
.memo:focus{border-color:#7c3aed}
.nav-buttons{display:flex;gap:10px;padding:16px 0;margin-top:auto;padding-bottom:max(16px,env(safe-area-inset-bottom))}
.nav-buttons button{flex:1}

/* Complete */
.complete-icon{font-size:56px;text-align:center;margin:40px 0 16px}
.complete-title{font-size:22px;font-weight:700;text-align:center}
.complete-body{text-align:center;color:#4b5563;font-size:13px;line-height:1.7;margin:12px 20px 0;max-width:300px;margin-left:auto;margin-right:auto}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:center;margin:20px 0}
.stat-num{font-size:24px;font-weight:700}
.stat-num.purple{color:#a78bfa}
.stat-num.green{color:#34d399}
.stat-label{font-size:11px;color:#6b7280;margin-top:4px}
.footer{text-align:center;color:#9ca3af;font-size:11px;margin-top:24px}
</style>
</head>
<body>
<div class="container">

<!-- HOME PAGE -->
<div id="page-home" class="page active">
  <div class="home-icon">📖</div>
  <h1>QT 7분법 기도</h1>
  <p class="subtitle">매일 말씀과 함께하는 기도</p>
  <div class="card">
    <div class="card-label">오늘의 말씀</div>
    <div class="card-title" id="home-chapter"></div>
    <div class="card-sub" id="home-book-progress"></div>
    <div class="progress-label"><span>전체 진행률</span><span id="home-total-progress"></span></div>
    <div class="progress-bar"><div class="progress-fill" id="home-progress-bar"></div></div>
  </div>
  <div class="streak" id="home-streak"></div>
  <div id="home-start">
    <input type="text" id="user-name" placeholder="이름 입력 (선택사항)" style="width:100%;padding:14px;background:#fff;border:1px solid #e4e4e7;border-radius:12px;font-size:15px;text-align:center;outline:none;color:#1a1a1a;margin-bottom:12px" autocomplete="off">
    <button class="btn-primary" onclick="startPrayer()">기도 🙏</button>
  </div>
  <div id="home-done" class="done-check" style="display:none">
    <div class="big">✅</div>
    <p>오늘의 기도를 완료했어요!</p>
    <a href="#" onclick="startPrayer();return false" style="color:#a78bfa;font-size:13px">다시 보기</a>
  </div>
  <p class="footer">매일 1장씩, 성경 전체를 함께 읽어요</p>
</div>

<!-- PRAYER PAGE -->
<div id="page-prayer" class="page">
  <div class="topbar">
    <a href="#" onclick="goHome();return false">← 홈</a>
    <span id="prayer-step-label">묵상</span>
    <span id="prayer-chapter-label"></span>
  </div>
  <div class="progress-bar" style="margin-bottom:8px"><div class="progress-fill" id="prayer-progress"></div></div>

  <div id="prayer-content"></div>

  <div class="nav-buttons">
    <button class="btn-secondary" id="btn-prev" onclick="prevStep()" style="display:none">← 이전</button>
    <button class="btn-primary" id="btn-next" onclick="nextStep()">기도 🙏</button>
  </div>
</div>

<!-- COMPLETE PAGE -->
<div id="page-complete" class="page">
  <div class="complete-icon" id="comp-emoji"></div>
  <div class="complete-title" id="comp-title"></div>
  <p class="complete-body" id="comp-body"></p>
  <div class="card">
    <div class="stats">
      <div><div class="stat-num purple" id="comp-days"></div><div class="stat-label">기도 완료 일수</div></div>
      <div><div class="stat-num green" id="comp-pct"></div><div class="stat-label">성경 진행률</div></div>
    </div>
  </div>
  <!-- 오늘의 기도 기록 -->
  <div id="comp-memos" class="card" style="text-align:left;margin-top:12px"></div>
  <button class="btn-primary" onclick="downloadMemoImage()" style="margin-top:12px">기도 기록 저장 📷</button>
  <button class="btn-secondary" onclick="goHome()">홈으로 돌아가기</button>
  <p class="footer">내일도 함께 기도해요 🙏</p>
</div>
<!-- Hidden canvas for image generation -->
<canvas id="memo-canvas" style="display:none"></canvas>

</div>
<script>
// === Bible Data ===
const BOOKS=[['마태복음','matt',28],['마가복음','mark',16],['누가복음','luke',24],['요한복음','john',21],['사도행전','acts',28],['로마서','rom',16],['고린도전서','1cor',16],['고린도후서','2cor',13],['갈라디아서','gal',6],['에베소서','eph',6],['빌립보서','phil',4],['골로새서','col',4],['데살로니가전서','1thess',5],['데살로니가후서','2thess',3],['디모데전서','1tim',6],['디모데후서','2tim',4],['디도서','titus',3],['빌레몬서','phlm',1],['히브리서','heb',13],['야고보서','jas',5],['베드로전서','1pet',5],['베드로후서','2pet',3],['요한일서','1john',5],['요한이서','2john',1],['요한삼서','3john',1],['유다서','jude',1],['요한계시록','rev',22],['창세기','gen',50],['출애굽기','exod',40],['레위기','lev',27],['민수기','num',36],['신명기','deut',34],['여호수아','josh',24],['사사기','judg',21],['룻기','ruth',4],['사무엘상','1sam',31],['사무엘하','2sam',24],['열왕기상','1kgs',22],['열왕기하','2kgs',25],['역대상','1chr',29],['역대하','2chr',36],['에스라','ezra',10],['느헤미야','neh',13],['에스더','esth',10],['욥기','job',42],['시편','ps',150],['잠언','prov',31],['전도서','eccl',12],['아가','song',8],['이사야','isa',66],['예레미야','jer',52],['예레미야애가','lam',5],['에스겔','ezek',48],['다니엘','dan',12],['호세아','hos',14],['요엘','joel',3],['아모스','amos',9],['오바댜','obad',1],['요나','jonah',4],['미가','mic',7],['나훔','nah',3],['하박국','hab',3],['스바냐','zeph',3],['학개','hag',2],['스가랴','zech',14],['말라기','mal',4]];
const ALL=[];let idx=0;BOOKS.forEach(([ko,en,tc])=>{const s=ko==='마태복음'?2:1;for(let c=s;c<=tc;c++){ALL.push({ko,en,ch:c,tc,gi:idx++})}});
const TOTAL=ALL.length;
const SECTION_SIZE=12; // 한 번에 보여줄 최대 절 수

const STEPS=[
{id:2,title:'찬양과 경배',sub:'Praise & Worship',icon:'🎵',guide:'하나님의 위대하심과 선하심을 찬양하며, 마음을 다해 경배하세요. 하나님이 어떤 분이신지, 나에게 어떤 일을 행하셨는지 고백하며 찬양을 올려드립니다. 찬양은 말로, 노래로, 또는 마음속 고백으로도 할 수 있습니다.',ph:'하나님께 드리는 찬양과 경배를 적어보세요...'},
{id:3,title:'감사',sub:'Thanksgiving',icon:'🙏',guide:'오늘 감사한 것들을 하나하나 떠올리며 감사를 고백하세요. 건강, 가족, 오늘 하루의 양식, 작은 것 하나까지 감사의 제목이 됩니다. 감사할수록 더 많은 감사가 보이고, 마음에 기쁨이 차오릅니다.',ph:'감사한 것들을 적어보세요...'},
{id:4,title:'회개',sub:'Repentance',icon:'💧',guide:'마음을 돌아보며, 하나님 앞에서 부족했던 점을 회개하세요. 말과 행동, 생각에서 하나님의 뜻에서 벗어난 것이 없었는지 점검합니다. 하나님은 회개하는 자를 기꺼이 용서하시고, 새롭게 시작할 힘을 주십니다.',ph:'회개하고 싶은 것들을 적어보세요...'},
{id:5,title:'간구',sub:'Supplication',icon:'🙌',guide:'개인적으로 필요한 것들을 하나님께 구하세요. 건강, 학업, 직장, 인간관계, 경제적 필요 등 무엇이든 솔직하게 아뢰면 됩니다. 하나님은 우리의 필요를 아시고, 가장 좋은 것으로 채워주시는 분입니다.',ph:'기도 제목을 적어보세요...'},
{id:6,title:'중보기도',sub:'Intercession',icon:'🤝',guide:'가족, 친구, 이웃, 교회, 나라를 위해 기도하세요. 나를 넘어 다른 사람의 필요를 위해 기도하는 것은 가장 아름다운 사랑의 표현입니다. 지금 어려움을 겪고 있는 사람을 떠올리며 그를 위해 하나님께 간구하세요.',ph:'누구를 위해 기도하나요?'},
{id:7,title:'특별대상을 위한 기도',sub:'Special Prayer',icon:'🌟',guide:'특별히 마음에 두고 있는 사람이나 상황을 위해 기도하세요. 선교사, 목회자, 고난 중에 있는 나라, 질병과 싸우는 분 등 특별한 기도가 필요한 대상을 떠올립니다. 당신의 기도 한 마디가 누군가에게 큰 힘이 됩니다.',ph:'특별 기도 대상과 내용을 적어보세요...'}
];

const MSGS=[
{e:'✨',t:'수고하셨습니다!',b:'오늘도 하나님 앞에 귀한 시간을 드렸습니다. 기도로 시작한 이 하루, 주님이 함께하시니 어떤 일이든 넉넉히 이겨낼 수 있습니다. 말씀을 마음에 품고 나가는 당신의 발걸음 위에 하나님의 은혜가 넘치기를 축복합니다. "항상 기뻐하라 쉬지 말고 기도하라 범사에 감사하라" (살전 5:16-18)'},
{e:'🌅',t:'오늘도 주와 동행하는 하루입니다!',b:'이 아침 기도를 통해 하나님과 마음을 나누셨습니다. 오늘 하루 어디를 가든, 무엇을 하든, 주님이 당신과 함께 걸어가십니다. 눈에 보이지 않아도 그분은 항상 당신 곁에 계십니다. 담대하게 나아가세요. "의인의 간구는 역사하는 힘이 큼이라" (약 5:16)'},
{e:'💪',t:'하나님이 기뻐하시는 기도였습니다!',b:'매일 기도의 자리에 나아오는 것, 그것 자체가 믿음의 증거입니다. 오늘 드린 기도가 헛되지 않습니다. 하나님은 당신의 한 마디 한 마디를 소중히 들으셨습니다. 이 기도의 능력이 오늘 하루를 변화시킬 것입니다. "오직 마음을 새롭게 함으로 변화를 받아" (롬 12:2)'},
{e:'🕊️',t:'평안 가운데 나아가세요!',b:'기도를 마친 지금, 하나님의 평강이 당신의 마음을 감싸고 있습니다. 오늘 어떤 걱정거리가 있더라도, 이미 기도로 주님께 맡겼으니 마음 놓으세요. 주님이 당신의 길을 인도하시고, 모든 필요를 채워주실 것입니다. "아무 것도 염려하지 말고 다만 모든 일에 기도와 간구로" (빌 4:6)'},
{e:'🌿',t:'은혜 안에서 자라가고 있습니다!',b:'꾸준히 말씀을 묵상하고 기도하는 당신은 시냇가에 심은 나무와 같습니다. 당장 눈에 보이지 않아도, 영적으로 깊이 뿌리를 내리고 있습니다. 때가 되면 반드시 아름다운 열매를 맺게 될 것입니다. 오늘도 주님과 함께하는 복된 하루 되세요. "시냇가에 심은 나무가 철을 따라 열매를 맺으며" (시 1:3)'},
{e:'🔥',t:'기도의 불꽃이 타오릅니다!',b:'오늘 드린 뜨거운 기도가 하늘에 닿았습니다. 하나님은 간절히 구하는 자의 기도를 기뻐 받으십니다. 이 기도의 응답이 당신의 삶 곳곳에서 나타날 것입니다. 기대하며 나아가세요, 주님이 일하고 계십니다. "너희가 내 이름으로 무엇을 구하든지 내가 행하리니" (요 14:13)'},
{e:'⭐',t:'세상의 빛으로 나아가세요!',b:'기도로 충전된 당신은 오늘 만나는 모든 사람에게 빛이 될 수 있습니다. 작은 미소, 따뜻한 한마디, 배려하는 마음 — 그것이 바로 하나님의 사랑을 전하는 방법입니다. 오늘 하루, 당신을 통해 하나님의 빛이 비춰지기를 기도합니다. "너희는 세상의 빛이라" (마 5:14)'},
{e:'🌈',t:'소망을 품고 나아가세요!',b:'오늘의 기도가 내일의 소망이 됩니다. 때로는 기다림이 길어질 수 있지만, 하나님은 반드시 약속을 지키시는 분입니다. 포기하지 마세요. 주님이 예비하신 좋은 것들이 당신을 기다리고 있습니다. 오늘도 소망 가운데 행복한 하루 되세요. "소망의 하나님이 모든 기쁨과 평강을 믿음 안에서 너희에게 충만하게 하사" (롬 15:13)'},
{e:'💝',t:'사랑하는 하나님의 자녀입니다!',b:'하나님이 당신을 얼마나 사랑하시는지 기억하세요. 기도하는 이 순간에도, 일하는 중에도, 쉬고 있을 때에도 그분의 사랑은 변함이 없습니다. 오늘 하루 그 사랑을 느끼며, 주변 사람들에게도 그 사랑을 나눠주세요. "내가 너를 사랑하는 것 같이 너희도 서로 사랑하라" (요 13:34)'},
{e:'🌻',t:'감사가 넘치는 하루가 될 거예요!',b:'기도 속에서 감사를 고백한 당신의 하루는 이미 축복받았습니다. 감사하는 마음은 우리의 시선을 바꾸고, 같은 하루도 전혀 다르게 만들어 줍니다. 오늘도 작은 것에 감사하며, 주님이 주신 모든 것을 기뻐하는 하루 되세요. "여호와를 기뻐하라 그가 네 마음의 소원을 이루어 주시리로다" (시 37:4)'},

// === Helpers ===
const today=()=>new Date().toISOString().split('T')[0];
const lsGet=(k)=>localStorage.getItem('qt-'+k)||'';
const lsSet=(k,v)=>localStorage.setItem('qt-'+k,v);

function getChapter(){
  const start=new Date(lsGet('start')||'2026-04-13');
  const now=new Date();start.setHours(0,0,0,0);now.setHours(0,0,0,0);
  const d=Math.floor((now-start)/(864e5));
  return ALL[((d%TOTAL)+TOTAL)%TOTAL];
}
function getHistory(){try{return JSON.parse(lsGet('history')||'[]')}catch{return[]}}

function generateMeditation(ch, text) {
  const lines = text.split('\n').filter(l=>l.trim());
  const clean = v=>v.replace(/^\d+\.\s*/,'').trim();
  const name = ch.ko+' '+ch.ch+'장';
  const total = lines.length;

  // Pick 2 key verses from this section
  const v1 = clean(lines[Math.min(1, total-1)]||'');
  const v2 = clean(lines[Math.max(0, total-2)]||'');

  // Extract people names mentioned
  const people = [];
  const pMatch = text.match(/예수|모세|다윗|아브라함|야곱|요셉|바울|베드로|엘리야|사울|솔로몬|여호수아|이삭|사무엘|느헤미야|에스더|룻|다니엘|요나|마리아|헤롯|빌라도|니고데모|삭개오/g);
  if(pMatch) pMatch.forEach(p=>{if(!people.includes(p))people.push(p)});

  // Extract places
  const places = [];
  const plMatch = text.match(/예루살렘|베들레헴|이집트|애굽|가나안|바벨론|갈릴리|나사렛|시내산|요단|시온|다메섹|고린도|로마|안디옥/g);
  if(plMatch) plMatch.forEach(p=>{if(!places.includes(p))places.push(p)});

  // Detect multiple themes with weights
  const th = [];
  if(text.match(/왕|나라|통치|다스리|보좌|권세/)) th.push('kingdom');
  if(text.match(/두려|무서|걱정|염려|떨/)) th.push('fear');
  if(text.match(/사랑|긍휼|은혜|자비|돌보/)) th.push('love');
  if(text.match(/믿음|신뢰|의지|의롭/)) th.push('faith');
  if(text.match(/순종|명령|계명|지키/)) th.push('obey');
  if(text.match(/죄|악|회개|용서|돌이키/)) th.push('repent');
  if(text.match(/감사|찬양|영광|높이|노래/)) th.push('praise');
  if(text.match(/소망|희망|기다|인내|참/)) th.push('hope');
  if(text.match(/구원|구하|건지|살리|십자가/)) th.push('salvation');
  if(text.match(/평안|평화|쉼|안식/)) th.push('peace');
  if(text.match(/치유|고치|낫|병|아픔/)) th.push('healing');
  if(text.match(/기도|간구|부르짖|무릎/)) th.push('prayer');
  if(text.match(/제자|따르|섬기|봉사|사역/)) th.push('serve');
  if(text.match(/심판|징계|경고|멸망/)) th.push('judgment');
  if(text.match(/약속|언약|맹세|보장/)) th.push('promise');
  if(text.match(/지혜|총명|깨달|분별/)) th.push('wisdom');
  if(text.match(/창조|만드|태초|하늘|땅/)) th.push('creation');
  if(text.match(/부활|살아나|무덤|죽음을 이기/)) th.push('resurrection');

  let p = '';

  // Opening - specific to this chapter
  p += `${name}은 총 ${total}절의 말씀입니다. `;

  if(people.length>0) {
    p += `이 말씀에는 ${people.slice(0,3).join(', ')}${people.length>3?'등이':'이'} 등장합니다. `;
  }
  if(places.length>0) {
    p += `${places.slice(0,2).join('과 ')}${places.length>1?'을':'를'} 배경으로 펼쳐지는 이야기입니다. `;
  }

  // First verse analysis
  p += `말씀은 "${v1.substring(0,50)}"(으)로 시작합니다. `;

  // Theme-based deep content (using actual verse content)
  if(th.includes('kingdom')) {
    p += `이 말씀은 하나님의 나라와 그분의 주권을 선포합니다. 인간의 왕국은 흥하고 망하지만 하나님의 나라는 영원합니다. 우리가 어떤 세상적 권력 앞에 서 있든, 궁극적인 통치자는 하나님이시라는 사실이 우리에게 큰 위로가 됩니다. `;
  }
  if(th.includes('fear')) {
    p += `이 말씀 속 인물들은 두려운 상황에 직면했습니다. 그러나 하나님은 그 두려움 한가운데서 "내가 너와 함께하노라"고 말씀하셨습니다. 두려움은 우리를 하나님께로 더 가까이 이끄는 초대장이 될 수 있습니다. `;
  }
  if(th.includes('love')) {
    p += `하나님의 사랑이 이 말씀 곳곳에 스며들어 있습니다. 조건 없이, 변함없이 우리를 향하시는 그 사랑은 우리가 받을 수 있는 가장 큰 선물입니다. 이 사랑을 깊이 묵상할 때 우리의 마음도 변화됩니다. `;
  }
  if(th.includes('faith')) {
    p += `이 말씀은 믿음의 본질이 무엇인지 보여줍니다. 눈에 보이는 것이 아니라 보이지 않는 하나님의 약속을 붙잡는 것, 그것이 성경이 말하는 믿음입니다. 이 말씀 속 인물들의 믿음에서 우리도 도전을 받습니다. `;
  }
  if(th.includes('repent')) {
    p += `하나님은 우리의 잘못을 지적하시되, 정죄하시려는 것이 아니라 회복시키시려는 것입니다. 회개는 하나님과의 관계가 새로워지는 놀라운 경험입니다. 하나님 앞에 솔직해질 수 있는 용기를 구합니다. `;
  }
  if(th.includes('obey')) {
    p += `순종의 길은 때로 이해하기 어렵지만, 하나님의 관점에서 보면 그것이 가장 지혜로운 선택입니다. 이 말씀은 순종할 때 따라오는 축복과 불순종의 결과를 분명하게 보여줍니다. `;
  }
  if(th.includes('salvation')) {
    p += `구원의 이야기가 이 말씀에 담겨 있습니다. 하나님은 처음부터 인류를 구원하시려는 위대한 계획을 가지고 계셨고, 그 계획은 단 한 순간도 멈춘 적이 없습니다. `;
  }
  if(th.includes('healing')) {
    p += `상한 심령을 치유하시는 하나님의 손길이 이 말씀에 나타납니다. 육체적 치유뿐 아니라 마음과 영혼의 회복까지, 하나님은 온전한 치유를 원하십니다. `;
  }
  if(th.includes('prayer')) {
    p += `이 말씀은 기도의 능력을 보여줍니다. 간절한 기도가 하늘의 문을 열고, 불가능해 보이는 상황을 변화시킵니다. 기도는 우리가 가진 가장 강력한 무기입니다. `;
  }
  if(th.includes('wisdom')) {
    p += `하나님의 지혜는 세상의 지혜와 다릅니다. 이 말씀은 참된 지혜가 어디에서 오는지, 그리고 그 지혜가 우리 삶을 어떻게 인도하는지 알려줍니다. `;
  }
  if(th.includes('promise')) {
    p += `하나님의 약속이 이 말씀에 선명하게 드러납니다. 한 번 하신 약속은 반드시 이루시는 분, 그분의 신실하심을 우리는 역사 속에서 반복적으로 확인할 수 있습니다. `;
  }
  if(th.includes('judgment')) {
    p += `하나님의 공의가 이 말씀에 나타납니다. 심판의 메시지가 두렵게 느껴질 수 있지만, 그것은 우리를 올바른 길로 인도하시려는 사랑의 경고입니다. `;
  }
  if(th.includes('praise')) {
    p += `하나님을 찬양하는 것은 단순한 종교적 행위가 아니라, 삶의 모든 순간에 하나님의 선하심을 인정하는 것입니다. 찬양할 때 우리의 시선이 문제에서 하나님께로 옮겨집니다. `;
  }
  if(th.includes('hope')) {
    p += `절망 속에서도 소망이 있다는 것, 이것이 이 말씀이 전하는 핵심 메시지입니다. 당장 눈앞이 막막해도, 하나님은 이미 길을 예비해 두셨습니다. `;
  }
  if(th.includes('serve')) {
    p += `섬김의 삶은 예수님이 직접 보여주신 길입니다. 높은 자리가 아닌 낮은 자리에서 시작되는 하나님 나라의 원리가 이 말씀에 담겨 있습니다. `;
  }
  if(th.includes('creation')) {
    p += `만물을 창조하신 하나님의 위대하심이 이 말씀에 드러납니다. 그 위대하신 분이 우리 한 사람 한 사람을 소중히 여기신다는 사실이 경이롭습니다. `;
  }
  if(th.includes('resurrection')) {
    p += `죽음을 이기신 부활의 능력이 이 말씀에 선포됩니다. 부활은 우리 믿음의 핵심이며, 이 땅의 모든 고통과 아픔에도 마지막 승리가 있다는 확증입니다. `;
  }
  if(th.includes('peace')) {
    p += `참된 평안은 환경에 좌우되지 않습니다. 하나님이 주시는 평안은 폭풍 한가운데서도 잔잔한 호수처럼 우리 마음을 지켜 줍니다. `;
  }

  // If no themes detected, use verse content directly
  if(th.length===0) {
    p += `이 말씀은 하나님의 성품과 그분의 뜻을 보여주는 귀한 본문입니다. 한 절 한 절 천천히 읽으며 하나님이 어떤 분이신지 묵상해 보세요. `;
  }

  // Key verse highlight
  p += `특별히 "${v2.substring(0,55)}"라는 말씀에 주목해 봅시다. 이 구절이 오늘 나의 상황에서 어떤 의미를 갖는지 생각해 보세요. `;

  // Unique closing based on chapter number (rotates)
  const closings = [
    '이 말씀이 오늘 하루를 살아가는 힘이 되기를 기도합니다.',
    '이 말씀을 하루 동안 마음에 새기며, 하나님의 음성에 귀 기울이는 하루가 되세요.',
    '오늘 이 말씀 한 구절을 외워보는 것은 어떨까요? 말씀이 삶을 변화시킵니다.',
    '이 말씀을 통해 만난 하나님의 마음을 주변 사람들과도 나눠보세요.',
    '말씀을 묵상한 이 시간이 하루 중 가장 귀한 시간이 되기를 축복합니다.',
    '하나님이 이 말씀을 통해 당신에게 하신 이야기를 기억하며 하루를 시작하세요.',
    '오늘 읽은 말씀이 삶의 결정적 순간에 떠올라 지혜를 더해주기를 기도합니다.',
  ];
  p += closings[ch.ch % closings.length] + ' 🙏';

  return p;
}
function markDone(){const h=getHistory();const t=today();if(!h.includes(t)){h.push(t);lsSet('history',JSON.stringify(h))}}

// === State ===
let currentStep=0; // 0=bible, 1-7=steps
let chapter=null;
let bibleText='';
let sectionLabel=''; // e.g. "1-12절"

// === Pages ===
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}

function goHome(){
  showPage('home');
  chapter=getChapter();
  const h=getHistory();
  document.getElementById('home-chapter').textContent=chapter.ko+' '+chapter.ch+'장';
  document.getElementById('home-book-progress').textContent=chapter.ko+' '+chapter.ch+'/'+chapter.tc+'장';
  document.getElementById('home-total-progress').textContent=(chapter.gi+1)+' / '+TOTAL;
  document.getElementById('home-progress-bar').style.width=((chapter.gi+1)/TOTAL*100)+'%';
  if(h.length>0)document.getElementById('home-streak').textContent='🔥 '+h.length+'일 기도 완료';
  // Always show start button
  document.getElementById('home-start').style.display='block';
  document.getElementById('home-done').style.display='none';
  // Restore saved name
  const savedName=lsGet('username');
  if(savedName) document.getElementById('user-name').value=savedName;
}

function getUserName(){
  const el=document.getElementById('user-name');
  const name=(el?el.value:'').trim();
  if(name) lsSet('username',name);
  return name;
}

async function startPrayer(){
  currentStep=0;
  chapter=getChapter();
  // Show loading on home page button
  const btn=document.querySelector('#home-start .btn-primary');
  if(btn){btn.textContent='말씀 불러오는 중...';btn.disabled=true;}
  // Fetch bible first
  await fetchBible();
  // Now show prayer page
  if(btn){btn.textContent='기도 🙏';btn.disabled=false;}
  showPage('prayer');
  document.getElementById('prayer-chapter-label').textContent=chapter.ko+' '+chapter.ch+'장';
  renderStep();
}

async function fetchBible(){
  const bookNum={gen:1,exod:2,lev:3,num:4,deut:5,josh:6,judg:7,ruth:8,'1sam':9,'2sam':10,'1kgs':11,'2kgs':12,'1chr':13,'2chr':14,ezra:15,neh:16,esth:17,job:18,ps:19,prov:20,eccl:21,song:22,isa:23,jer:24,lam:25,ezek:26,dan:27,hos:28,joel:29,amos:30,obad:31,jonah:32,mic:33,nah:34,hab:35,zeph:36,hag:37,zech:38,mal:39,matt:40,mark:41,luke:42,john:43,acts:44,rom:45,'1cor':46,'2cor':47,gal:48,eph:49,phil:50,col:51,'1thess':52,'2thess':53,'1tim':54,'2tim':55,titus:56,phlm:57,heb:58,jas:59,'1pet':60,'2pet':61,'1john':62,'2john':63,'3john':64,jude:65,rev:66};
  const bn=bookNum[chapter.en]||40;
  bibleText='';sectionLabel='';
  let allVerses=[];
  try{
    const r=await fetch('https://bolls.life/get-chapter/KRV/'+bn+'/'+chapter.ch+'/');
    if(r.ok){const v=await r.json();if(Array.isArray(v))allVerses=v;}
  }catch{}
  if(allVerses.length===0){
    try{
      const r2=await fetch('https://bible-api.com/'+chapter.en+'+'+chapter.ch+'?translation=kjv');
      if(r2.ok){const d=await r2.json();if(d.text)bibleText=d.text;sectionLabel='';}
    }catch{}
    if(!bibleText)bibleText=chapter.ko+' '+chapter.ch+'장의 말씀을 묵상하세요.\n\n성경책을 펴고 읽어주세요.';
  } else {
    // Split chapter into sections of ~SECTION_SIZE verses
    const totalV=allVerses.length;
    if(totalV<=SECTION_SIZE){
      // Short chapter — show all
      bibleText=allVerses.map(v=>v.verse+'. '+v.text).join('\n');
      sectionLabel='1-'+totalV+'절 (전체)';
    } else {
      // Split into sections
      const numSections=Math.ceil(totalV/SECTION_SIZE);
      // Which section for today? Use day count within this chapter
      const dayIndex=lsGet('section-'+chapter.en+'-'+chapter.ch);
      let secIdx=dayIndex?parseInt(dayIndex):0;
      if(isNaN(secIdx)||secIdx>=numSections)secIdx=0;
      const start=secIdx*SECTION_SIZE;
      const end=Math.min(start+SECTION_SIZE,totalV);
      const section=allVerses.slice(start,end);
      bibleText=section.map(v=>v.verse+'. '+v.text).join('\n');
      sectionLabel=(start+1)+'-'+end+'절 ('+numSections+'부분 중 '+(secIdx+1)+'번째)';
      // Next time show next section
      lsSet('section-'+chapter.en+'-'+chapter.ch,String((secIdx+1)%numSections));
    }
  }
  if(currentStep===0)renderStep();
}

function renderStep(){
  const content=document.getElementById('prayer-content');
  const prog=document.getElementById('prayer-progress');
  const label=document.getElementById('prayer-step-label');
  const btnPrev=document.getElementById('btn-prev');
  const btnNext=document.getElementById('btn-next');

  const totalSteps=STEPS.length+1; // 1(묵상) + 6(찬양~특별)
  prog.style.width=((currentStep+1)/totalSteps*100)+'%';
  btnPrev.style.display=currentStep>0?'block':'none';

  if(currentStep<STEPS.length){
    btnNext.textContent='기도 🙏';
    btnNext.className='btn-primary';
    btnNext.onclick=nextStep;
  }else{
    btnNext.textContent='기도 완료 ✓';
    btnNext.className='btn-primary btn-complete';
    btnNext.onclick=completePrayer;
  }

  const t=today();
  if(currentStep===0){
    label.textContent='1. 묵상';
    const txt=bibleText||'말씀을 불러오지 못했습니다. 새로고침 해주세요.';
    const summary=bibleText ? generateMeditation(chapter, bibleText) : chapter.ko+' '+chapter.ch+'장을 천천히 읽고 하나님의 음성에 귀 기울여 보세요.';
    const memo=lsGet('memo-'+t+'-0')||'';
    content.innerHTML=`
      <div class="step-icon">📖</div>
      <div class="step-title">1. 묵상</div>
      <p class="subtitle" style="margin:4px 0 0">${chapter.ko} ${chapter.ch}장 ${sectionLabel?'('+sectionLabel+')':''}</p>
      <div class="bible-box">${txt.replace(/\n/g,'<br>')}</div>
      <div class="summary-box"><div class="label">✝️ 묵상 가이드</div><div style="font-size:13px;color:#374151;line-height:1.8">${summary}</div></div>
      <textarea class="memo" placeholder="말씀을 통해 느낀 점을 적어보세요..." oninput="saveMemo(0,this.value)">${memo}</textarea>`;
  }else{
    const s=STEPS[currentStep-1];
    const stepNum=currentStep+1;
    label.textContent=stepNum+'. '+s.title;
    const memo=lsGet('memo-'+t+'-'+s.id)||'';
    content.innerHTML=`
      <div class="step-icon">${s.icon}</div>
      <div class="step-title">${stepNum}. ${s.title}</div>
      <div class="step-subtitle">${s.sub}</div>
      <div class="guide-box">${s.guide}</div>
      <textarea class="memo" placeholder="${s.ph}" oninput="saveMemo(${s.id},this.value)">${memo}</textarea>`;
  }
}

function saveMemo(id,val){lsSet('memo-'+today()+'-'+id,val)}
function nextStep(){if(currentStep<STEPS.length){currentStep++;renderStep();window.scrollTo(0,0)}}
function prevStep(){if(currentStep>0){currentStep--;renderStep();window.scrollTo(0,0)}}

function completePrayer(){
  markDone();
  showPage('complete');
  const m=MSGS[new Date().getDate()%MSGS.length];
  const h=getHistory();
  document.getElementById('comp-emoji').textContent=m.e;
  const uname=getUserName();
  document.getElementById('comp-title').textContent=uname ? uname+'님, '+m.t : m.t;
  document.getElementById('comp-body').textContent=m.b;
  document.getElementById('comp-days').textContent=h.length;
  document.getElementById('comp-pct').textContent=((chapter.gi+1)/TOTAL*100).toFixed(1)+'%';

  // Show collected memos
  const t=today();
  const allSteps=[{id:0,title:'묵상',icon:'📖'},...STEPS.map((s,i)=>({id:s.id,title:s.title,icon:s.icon}))];
  let memosHtml='<div style="font-size:14px;font-weight:600;margin-bottom:10px">📝 오늘의 기도 기록</div>';
  let hasMemo=false;
  allSteps.forEach((s,i)=>{
    const memo=lsGet('memo-'+t+'-'+s.id)||'';
    if(memo.trim()){
      hasMemo=true;
      memosHtml+=`<div style="margin-bottom:10px"><div style="font-size:12px;color:#6d28d9;font-weight:600;margin-bottom:3px">${s.icon} ${i+1}. ${s.title}</div><div style="font-size:13px;color:#374151;line-height:1.6">${memo.replace(/\n/g,'<br>')}</div></div>`;
    }
  });
  if(!hasMemo) memosHtml+='<div style="font-size:13px;color:#9ca3af">기록된 메모가 없습니다.</div>';
  document.getElementById('comp-memos').innerHTML=memosHtml;
}

function downloadMemoImage(){
  const t=today();
  const uname=getUserName();
  const allSteps=[{id:0,title:'묵상',icon:'📖'},...STEPS.map(s=>({id:s.id,title:s.title,icon:s.icon}))];

  const canvas=document.getElementById('memo-canvas');
  const ctx=canvas.getContext('2d');
  const W=750, pad=40, lineH=24, titleH=36;

  // Collect memo texts
  const entries=[];
  allSteps.forEach((s,i)=>{
    const memo=(lsGet('memo-'+t+'-'+s.id)||'').trim();
    if(memo) entries.push({num:i+1, title:s.title, icon:s.icon, text:memo});
  });

  // Calculate height
  let totalLines=0;
  entries.forEach(e=>{
    totalLines+=2; // title + gap
    const words=e.text;
    totalLines+=Math.ceil(words.length/32)+1; // rough line count
  });
  const H=pad*2+80+totalLines*lineH+entries.length*20+60;

  canvas.width=W; canvas.height=Math.max(H,400);
  // Background
  ctx.fillStyle='#faf5ff'; ctx.fillRect(0,0,W,canvas.height);

  // Header
  let y=pad+10;
  ctx.fillStyle='#6d28d9'; ctx.font='bold 22px -apple-system,system-ui,sans-serif';
  ctx.fillText('🙏 QT 7분법 기도',pad,y); y+=30;
  ctx.fillStyle='#6b7280'; ctx.font='14px -apple-system,system-ui,sans-serif';
  const dateStr=t.replace(/-/g,'.');
  ctx.fillText((uname?uname+'님의 ':'')+'기도 기록 — '+dateStr+' | '+chapter.ko+' '+chapter.ch+'장',pad,y);
  y+=10;
  // Line
  ctx.strokeStyle='#e4e4e7'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pad,y+8); ctx.lineTo(W-pad,y+8); ctx.stroke();
  y+=24;

  // Entries
  entries.forEach(e=>{
    ctx.fillStyle='#6d28d9'; ctx.font='bold 15px -apple-system,system-ui,sans-serif';
    ctx.fillText(e.icon+' '+e.num+'. '+e.title,pad,y); y+=22;

    ctx.fillStyle='#374151'; ctx.font='14px -apple-system,system-ui,sans-serif';
    // Word wrap
    const maxW=W-pad*2;
    const chars=e.text.split('');
    let line='';
    for(const ch of chars){
      if(ch==='\n'){
        ctx.fillText(line,pad,y); y+=lineH; line=''; continue;
      }
      const test=line+ch;
      if(ctx.measureText(test).width>maxW){
        ctx.fillText(line,pad,y); y+=lineH; line=ch;
      }else{ line=test; }
    }
    if(line){ ctx.fillText(line,pad,y); y+=lineH; }
    y+=12;
  });

  if(entries.length===0){
    ctx.fillStyle='#9ca3af'; ctx.font='14px -apple-system,system-ui,sans-serif';
    ctx.fillText('기록된 메모가 없습니다.',pad,y);
  }

  // Footer
  y=canvas.height-pad;
  ctx.fillStyle='#9ca3af'; ctx.font='11px -apple-system,system-ui,sans-serif';
  ctx.fillText('QT 7분법 기도 앱 — gooddoo84.github.io/qt-prayer',pad,y);

  // Download
  const link=document.createElement('a');
  link.download='기도기록_'+t+'.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
}

// Init
goHome();
</script>
